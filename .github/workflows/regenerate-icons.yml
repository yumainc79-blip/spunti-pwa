name: Regenerate PWA icons

on:
  push:
    paths:
      - 'tools/generate_icons.py'
      - '.github/workflows/regenerate-icons.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate-icons:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install Pillow

      - name: Generate icons
        run: python tools/generate_icons.py

      - name: Bump service worker cache
        shell: pwsh
        run: |
          $sw = Get-Content service-worker.js -Raw
          if ($sw -match "spunti-v(\d+)") {
            $next = [int]$Matches[1] + 1
            $sw = $sw -replace "spunti-v\d+", "spunti-v$next"
            Set-Content service-worker.js $sw -NoNewline
            Write-Host "Bumped cache to spunti-v$next"
          } else {
            throw "CACHE_NAME version not found"
          }

      - name: Commit generated icons
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add icons service-worker.js
          if (git diff --cached --quiet) {
            Write-Host "No icon changes to commit."
          } else {
            git commit -m "Regenerate app icons from sprout symbol"
            git push
          }
